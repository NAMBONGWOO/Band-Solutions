<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산속밴드 - 입장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md glass-morphism rounded-3xl shadow-2xl p-8 space-y-8">
        <div class="text-center">
            <div class="inline-block p-4 bg-blue-500 rounded-full mb-4 shadow-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">우산속밴드</h1>
            <p class="text-gray-500 mt-2">멤버 전용 아지트</p>
        </div>

        <form id="entryForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-600">초대 코드</label>
                <input type="text" id="inviteCode" required placeholder="예: DRUM-1234" class="w-full px-5 py-4 bg-white border-0 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all uppercase">
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-600">생년월일 (6자리)</label>
                <input type="password" id="birthdate" required maxlength="6" inputmode="numeric" placeholder="YYMMDD" class="w-full px-5 py-4 bg-white border-0 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg transform active:scale-95 transition-all">
                우산속으로 들어가기
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNPl9n3gt-ZJqZHKFzSl5PufLOCgG7kI4",
            authDomain: "band-solutions.firebaseapp.com",
            projectId: "band-solutions",
            storageBucket: "band-solutions.firebasestorage.app",
            messagingSenderId: "1094046119043",
            appId: "1:1094046119043:web:e70814fad4cc0fea7097b6",
            measurementId: "G-XH3YYL86JN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inviteCode = document.getElementById('inviteCode').value.toUpperCase();
            const birthdate = document.getElementById('birthdate').value;

            // 관리자 체크
            if (inviteCode === "MASTER-7777") {
                const adminRef = doc(db, "usan_band", "LEADER");
                await setDoc(adminRef, { part: "LEADER", birth: birthdate, role: "admin", joinedAt: new Date().toISOString() });
                alert("반갑습니다, 리더님!");
                enterDashboard("LEADER", "admin");
                return;
            }

            const part = inviteCode.split('-')[0];
            if (!part || birthdate.length !== 6) { alert("코드와 생일을 확인해주세요."); return; }

            const memberRef = doc(db, "usan_band", part);
            const docSnap = await getDoc(memberRef);

            if (docSnap.exists()) {
                if (docSnap.data().birth === birthdate) {
                    enterDashboard(part, docSnap.data().role || "member");
                } else {
                    alert("이미 등록된 파트입니다.");
                }
            } else {
                await setDoc(memberRef, { part, birth: birthdate, role: "member", joinedAt: new Date().toISOString() });
                alert(`${part} 세션으로 가입되었습니다!`);
                enterDashboard(part, "member");
            }
        });

        function enterDashboard(part, role) {
            localStorage.setItem('myPart', part);
            localStorage.setItem('myRole', role);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
