<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>우산속밴드 - 입장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); min-height: 100vh; }
        .card { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.12); }
        input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: .875rem; padding: .9rem 1.1rem; width: 100%; font-size: 1rem; outline: none; transition: border-color .2s; }
        input:focus { border-color: #60a5fa; background: rgba(255,255,255,0.12); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        label { font-size: .8rem; color: rgba(255,255,255,0.5); display: block; margin-bottom: .4rem; }
        .btn { width: 100%; padding: 1rem; background: #2563eb; color: white; font-weight: 700; border-radius: .875rem; font-size: 1rem; cursor: pointer; transition: all .2s; border: none; }
        .btn:hover { background: #1d4ed8; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }
        .error-msg { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; border-radius: .75rem; padding: .65rem 1rem; font-size: .8rem; text-align: center; display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-5">
    <div class="w-full max-w-sm space-y-7">
        <div class="text-center space-y-3">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-500 bg-opacity-20 rounded-3xl border border-blue-400 border-opacity-30 text-4xl">☂️</div>
            <div>
                <h1 class="text-2xl font-bold text-white">우산속밴드</h1>
                <p class="text-blue-300 text-sm mt-1">멤버 전용 아지트</p>
            </div>
        </div>
        <div class="card rounded-3xl p-7 space-y-5">
            <div id="error-msg" class="error-msg"></div>
            <div>
                <label>초대 코드</label>
                <input type="text" id="inviteCode" placeholder="예: GUITAR-5678" autocomplete="off" autocorrect="off" spellcheck="false" style="text-transform:uppercase">
            </div>
            <div>
                <label>생년월일 (6자리)</label>
                <input type="password" id="birthdate" maxlength="6" inputmode="numeric" placeholder="YYMMDD">
            </div>
            <button id="submit-btn" onclick="handleEntry()" class="btn">우산속으로 들어가기 ☂️</button>
        </div>
        <p class="text-center text-slate-600 text-xs">초대코드는 밴드 리더에게 문의하세요</p>
    </div>

    <!-- 관리자 진입: 우하단 고정 열쇠 아이콘 -->
    <a href="admin.html"
       style="position:fixed;bottom:1.25rem;right:1.25rem;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#1e293b;text-decoration:none;opacity:.3;transition:opacity .2s;"
       onmouseover="this.style.opacity='0.65'"
       onmouseout="this.style.opacity='0.3'"
       title="시스템 관리자">🔐</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, doc, query, where, getDocs, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDNPl9n3gt-ZJqZHKFzSl5PufLOCgG7kI4",
    authDomain: "band-solutions.firebaseapp.com",
    projectId: "band-solutions",
    storageBucket: "band-solutions.firebasestorage.app",
    messagingSenderId: "1094046119043",
    appId: "1:1094046119043:web:e70814fad4cc0fea7097b6"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

if (localStorage.getItem('myPart')) location.href = 'dashboard.html';

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3500);
}
function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = on;
    btn.textContent = on ? '확인 중...' : '우산속으로 들어가기 ☂️';
}

window.handleEntry = async () => {
    const code = document.getElementById('inviteCode').value.trim().toUpperCase();
    const birth = document.getElementById('birthdate').value.trim();
    if (!code || !birth) { showError('초대코드와 생년월일을 입력해주세요'); return; }
    if (birth.length !== 6 || !/^\d{6}$/.test(birth)) { showError('생년월일은 숫자 6자리 (YYMMDD)'); return; }
    setLoading(true);
    try {
        // 초대코드 확인
        const invSnap = await getDocs(query(collection(db, 'usan_invites'), where('code', '==', code)));
        if (invSnap.empty) { showError('유효하지 않은 초대코드입니다'); setLoading(false); return; }

        const invDoc = invSnap.docs[0];
        const part = invDoc.data().part;
        const memberRef = doc(db, 'usan_band', part);
        const memberSnap = await getDoc(memberRef);

        if (memberSnap.exists()) {
            // 재로그인: 생년월일 확인
            if (memberSnap.data().birth === birth) {
                enter(part, memberSnap.data().role || 'member', memberSnap.data().name || part);
            } else {
                showError('생년월일이 일치하지 않습니다');
            }
        } else {
            // 최초 가입
            await setDoc(memberRef, { part, birth, role: 'member', name: part, joinedAt: new Date().toISOString() });
            await updateDoc(invDoc.ref, { used: true, usedAt: new Date().toISOString() });
            enter(part, 'member', part);
        }
    } catch(err) {
        showError('오류가 발생했습니다. 다시 시도해주세요');
    }
    setLoading(false);
};

function enter(part, role, name) {
    localStorage.setItem('myPart', part);
    localStorage.setItem('myRole', role);
    localStorage.setItem('myName', name);
    location.href = 'dashboard.html';
}

document.getElementById('birthdate').addEventListener('keydown', e => { if(e.key==='Enter') handleEntry(); });
document.getElementById('inviteCode').addEventListener('input', function() { this.value = this.value.toUpperCase(); });
</script>
</body>
</html>
