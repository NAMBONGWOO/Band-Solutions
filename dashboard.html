<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우산속밴드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f4f8; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #1d4ed8; }
        .nav-btn.active .nav-icon-bg { background-color: #dbeafe; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; display: none; align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-sheet { background: white; border-radius: 1.25rem 1.25rem 0 0; width: 100%; max-width: 28rem; padding: 1.25rem; max-height: 85vh; overflow-y: auto; }
        .modal-handle { width: 2.5rem; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 0 auto 1rem; }
        input[type="checkbox"] { width:18px; height:18px; accent-color:#2563eb; cursor:pointer; }
        input[type="range"] { accent-color: #2563eb; }
        .vote-bar { transition: width 0.4s ease; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        /* 연습곡 카드 펼침 */
        .song-detail { display: none; }
        .song-detail.open { display: block; }
        .song-card { border: 1px solid #e5e7eb; }
        .song-card.expanded { border-color: #3b82f6; }

        /* 상태 배지 */
        .badge-candidate { background:#eff6ff; color:#1d4ed8; }
        .badge-practice   { background:#fffbeb; color:#b45309; }
        .badge-done       { background:#f0fdf4; color:#15803d; }

        /* 파일 행 */
        .file-row { display:flex; align-items:center; gap:.6rem; padding:.65rem .85rem; border-bottom:1px solid #f3f4f6; }
        .file-row:last-child { border-bottom: none; }

        /* 공지 핀 */
        .notice-pin { border-left: 3px solid #3b82f6; padding: .6rem .85rem; background:#eff6ff; border-radius: 0 .65rem .65rem 0; }
        .notice-pin.important { border-left-color: #ef4444; background: #fef2f2; }

        /* 참고자료 링크 */
        .ref-item { display:flex; align-items:center; gap:.6rem; padding:.6rem .85rem; border-bottom:1px solid #f3f4f6; }
        .ref-item:last-child { border-bottom:none; }
    </style>
</head>
<body class="pb-24">

<!-- ── 상단 헤더 ── -->
<div class="sticky top-0 z-40 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-lg">☂️</div>
        <div>
            <p id="hd-part" class="text-xs font-bold text-blue-500 uppercase leading-none">PART</p>
            <p id="hd-bandname" class="text-sm font-bold text-gray-800 leading-tight">우산속밴드</p>
        </div>
    </div>
    <button id="logoutBtn" class="text-xs text-gray-400 border border-gray-200 px-3 py-1.5 rounded-xl">로그아웃</button>
</div>

<div class="max-w-md mx-auto px-4 pt-4">

<!-- ════════ ① 홈 탭 ════════ -->
<div id="tab-home" class="tab-content active space-y-4">

    <!-- 리더 관리 도구 -->
    <div id="admin-panel" class="hidden bg-blue-600 rounded-2xl p-4 space-y-3">
        <p class="text-blue-100 text-xs font-bold">🌟 리더 관리 도구</p>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="openTab('schedule')" class="bg-white text-blue-600 py-2.5 rounded-xl text-sm font-bold">📅 투표 만들기</button>
            <button onclick="openModal('noticeModal')" class="bg-blue-500 border border-blue-400 text-white py-2.5 rounded-xl text-sm font-bold">📢 공지 올리기</button>
            <button onclick="openModal('songModal')" class="bg-blue-500 border border-blue-400 text-white py-2.5 rounded-xl text-sm font-bold">🎵 곡 추가</button>
            <button onclick="openModal('refModal')" class="bg-blue-500 border border-blue-400 text-white py-2.5 rounded-xl text-sm font-bold">🔗 참고자료 등록</button>
        </div>
    </div>

    <!-- D-day + 합주실 정보 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
        <p class="text-xs text-gray-400 font-medium mb-2">다음 합주</p>
        <div id="dday-content" class="text-gray-400 text-sm text-center py-2">확정된 합주 일정이 없습니다</div>
        <div id="studio-info" class="hidden mt-3 pt-3 border-t border-gray-100 flex items-center gap-2">
            <span class="text-base">🏢</span>
            <div>
                <p id="studio-name-display" class="text-xs font-bold text-gray-700"></p>
                <p id="studio-addr-display" class="text-xs text-gray-400"></p>
            </div>
        </div>
    </div>

    <!-- 멤버 현황 (간략) -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <p class="text-xs font-bold text-gray-500">👥 멤버</p>
            <span id="home-member-count" class="text-xs text-blue-500 font-bold">0명</span>
        </div>
        <div id="home-member-chips" class="flex flex-wrap gap-1.5"></div>
    </div>

    <!-- 공지사항 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <p class="text-xs font-bold text-gray-500">📢 공지사항</p>
            <button id="notice-more-btn" class="text-xs text-blue-500 hidden">더보기</button>
        </div>
        <div id="notice-feed" class="space-y-2">
            <p class="text-gray-400 text-xs text-center py-2">공지가 없습니다</p>
        </div>
    </div>

    <!-- 참고자료 -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="flex justify-between items-center px-4 pt-4 pb-2">
            <p class="text-xs font-bold text-gray-500">🔗 참고자료</p>
        </div>
        <div id="ref-list" class="divide-y divide-gray-50">
            <p class="text-gray-400 text-xs text-center py-4">등록된 참고자료가 없습니다</p>
        </div>
    </div>

</div>

<!-- ════════ ② 스케줄 탭 ════════ -->
<div id="tab-schedule" class="tab-content space-y-4">

    <!-- 확정 일정 -->
    <div id="confirmed-schedule" class="hidden bg-green-50 border border-green-200 rounded-2xl p-4">
        <p class="text-xs font-bold text-green-600 mb-1">✅ 확정된 합주일</p>
        <p id="confirmed-date-text" class="text-base font-bold text-green-800"></p>
        <p id="confirmed-studio-text" class="text-xs text-green-600 mt-0.5"></p>
        <p class="text-xs text-green-500 mt-1">스케줄 자동 등록됨</p>
    </div>

    <!-- 투표 현황 -->
    <div class="bg-white rounded-2xl p-4 shadow-sm space-y-3">
        <div class="flex justify-between items-center">
            <p class="text-sm font-bold text-gray-700">합주 날짜 투표</p>
            <span id="vote-status-badge" class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">대기 중</span>
        </div>
        <div id="vote-options" class="space-y-2">
            <p class="text-gray-400 text-sm text-center py-4">진행 중인 투표가 없습니다</p>
        </div>
        <button id="submit-vote-btn" class="hidden w-full py-3 bg-blue-600 text-white font-bold rounded-xl text-sm">투표하기</button>
        <button id="confirm-vote-btn" class="hidden w-full py-3 bg-green-600 text-white font-bold rounded-xl text-sm">✅ 최다 득표일로 확정 (리더)</button>
    </div>

    <!-- 리더: 투표 만들기 -->
    <div id="create-vote-section" class="hidden bg-white rounded-2xl p-4 shadow-sm space-y-3">
        <p class="text-sm font-bold text-gray-700">📅 새 투표 만들기</p>
        <div id="date-inputs" class="space-y-2">
            <div class="flex gap-2">
                <input type="date" class="vote-date-input flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm">
                <input type="time" class="vote-time-input w-28 px-3 py-2 border border-gray-200 rounded-xl text-sm" value="14:00">
            </div>
        </div>
        <button onclick="addDateInput()" class="w-full py-2 border border-dashed border-gray-300 rounded-xl text-sm text-gray-500">+ 날짜 후보 추가</button>
        <input type="text" id="vote-deadline" placeholder="마감일 안내 (예: 4월 21일까지)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm">
        <button onclick="createVote()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl text-sm">투표 시작하기</button>
    </div>
</div>

<!-- ════════ ③ 연습곡 탭 (자료실 통합) ════════ -->
<div id="tab-songs" class="tab-content space-y-4">

    <!-- 필터 -->
    <div class="flex gap-2 overflow-x-auto pb-1">
        <button onclick="filterSongs('all',this)" class="song-filter-btn flex-none px-3 py-1.5 bg-blue-600 text-white rounded-full text-xs font-bold">전체</button>
        <button onclick="filterSongs('candidate',this)" class="song-filter-btn flex-none px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs font-bold">후보곡</button>
        <button onclick="filterSongs('practice',this)" class="song-filter-btn flex-none px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs font-bold">연습중</button>
        <button onclick="filterSongs('done',this)" class="song-filter-btn flex-none px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-xs font-bold">완료</button>
    </div>

    <div id="song-list" class="space-y-3"></div>

    <!-- 내 진도 업데이트 -->
    <div id="progress-section" class="hidden bg-white rounded-2xl p-4 shadow-sm space-y-3">
        <p class="text-sm font-bold text-gray-700">📊 내 연습 진도 업데이트</p>
        <select id="progress-song-select" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm">
            <option value="">연습중인 곡 선택...</option>
        </select>
        <div class="flex items-center gap-3">
            <input type="range" id="progress-range" min="0" max="100" step="5" value="50" class="flex-1">
            <span id="progress-val" class="text-sm font-bold text-blue-600 w-10 text-right">50%</span>
        </div>
        <button onclick="updateProgress()" class="w-full py-2.5 bg-blue-600 text-white font-bold rounded-xl text-sm">진도 저장</button>
    </div>
</div>

<!-- ════════ ④ 멤버 탭 (리더만) ════════ -->
<div id="tab-members" class="tab-content space-y-4">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <p class="text-sm font-bold text-gray-700">👥 멤버 현황</p>
            <span id="member-count" class="text-xs text-blue-500 font-bold">0명</span>
        </div>
        <ul id="member-list-admin" class="space-y-2"></ul>
    </div>
    <!-- 합주실 정보 (리더 확인용) -->
    <div class="bg-white rounded-2xl p-4 shadow-sm space-y-2">
        <p class="text-xs font-bold text-gray-500">🏢 합주실 정보</p>
        <p id="member-tab-studio" class="text-sm text-gray-600">—</p>
    </div>
</div>

</div><!-- end max-w-md -->

<!-- ── 하단 네비게이션 ── -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-lg z-40">
    <div class="max-w-md mx-auto flex justify-around py-2">
        <button onclick="openTab('home')" class="nav-btn active flex flex-col items-center gap-0.5 px-4 py-1">
            <span class="nav-icon-bg w-8 h-8 rounded-xl flex items-center justify-center text-base bg-blue-50">🏠</span>
            <span class="text-xs text-gray-500">홈</span>
        </button>
        <button onclick="openTab('schedule')" class="nav-btn flex flex-col items-center gap-0.5 px-4 py-1">
            <span class="nav-icon-bg w-8 h-8 rounded-xl flex items-center justify-center text-base">📅</span>
            <span class="text-xs text-gray-500">스케줄</span>
        </button>
        <button onclick="openTab('songs')" class="nav-btn flex flex-col items-center gap-0.5 px-4 py-1">
            <span class="nav-icon-bg w-8 h-8 rounded-xl flex items-center justify-center text-base">🎵</span>
            <span class="text-xs text-gray-500">연습곡</span>
        </button>
        <button id="nav-members-btn" onclick="openTab('members')" class="nav-btn hidden flex flex-col items-center gap-0.5 px-4 py-1">
            <span class="nav-icon-bg w-8 h-8 rounded-xl flex items-center justify-center text-base">👥</span>
            <span class="text-xs text-gray-500">멤버</span>
        </button>
    </div>
</nav>

<!-- ════════ 모달: 공지 작성 ════════ -->
<div id="noticeModal" class="modal-overlay">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p class="font-bold text-gray-800 mb-3">📢 공지 올리기</p>
        <div class="flex gap-2 mb-3">
            <button onclick="setNoticeType('normal')" id="nt-normal" class="flex-1 py-2 rounded-xl text-xs font-bold bg-blue-600 text-white">일반</button>
            <button onclick="setNoticeType('important')" id="nt-important" class="flex-1 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600">중요</button>
        </div>
        <input type="text" id="notice-title" placeholder="제목" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <textarea id="notice-body" rows="3" placeholder="내용" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm resize-none mb-3"></textarea>
        <div class="flex gap-2">
            <button onclick="closeModal('noticeModal')" class="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500">취소</button>
            <button onclick="postNotice()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">올리기</button>
        </div>
    </div>
</div>

<!-- ════════ 모달: 연습곡 추가 ════════ -->
<div id="songModal" class="modal-overlay">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p class="font-bold text-gray-800 mb-3">🎵 연습곡 추가</p>
        <input type="text" id="song-title-input" placeholder="곡 제목" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <input type="text" id="song-artist-input" placeholder="아티스트" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <select id="song-status-input" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-3">
            <option value="candidate">후보곡</option>
            <option value="practice">연습중</option>
            <option value="done">완료</option>
        </select>
        <div class="flex gap-2">
            <button onclick="closeModal('songModal')" class="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500">취소</button>
            <button onclick="addSong()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">추가</button>
        </div>
    </div>
</div>

<!-- ════════ 모달: 파일 업로드 (연습곡 내부) ════════ -->
<div id="fileModal" class="modal-overlay">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p class="font-bold text-gray-800 mb-1">📎 자료 업로드</p>
        <p id="file-modal-song-name" class="text-xs text-blue-600 mb-3"></p>
        <div class="flex gap-2 mb-3">
            <button onclick="setFileType('score')" id="ft-score" class="flex-1 py-2 rounded-xl text-xs font-bold bg-blue-600 text-white">📄 악보</button>
            <button onclick="setFileType('track')" id="ft-track" class="flex-1 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600">🎧 음원</button>
            <button onclick="setFileType('ref')" id="ft-ref" class="flex-1 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-600">🔗 링크</button>
        </div>
        <input type="text" id="file-name-input" placeholder="파일명 또는 제목" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <input type="text" id="file-url-input" placeholder="다운로드 URL / 링크" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <input type="text" id="file-size-input" placeholder="파일 크기 (예: 2.1MB) — 선택" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-3">
        <div class="flex gap-2">
            <button onclick="closeModal('fileModal')" class="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500">취소</button>
            <button onclick="uploadSongFile()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">업로드</button>
        </div>
    </div>
</div>

<!-- ════════ 모달: 참고자료 등록 ════════ -->
<div id="refModal" class="modal-overlay">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p class="font-bold text-gray-800 mb-3">🔗 참고자료 등록</p>
        <input type="text" id="ref-title-input" placeholder="제목 (예: 보컬 레퍼런스 영상)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <input type="text" id="ref-url-input" placeholder="URL (유튜브, 드라이브 등)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-2">
        <input type="text" id="ref-desc-input" placeholder="설명 (선택)" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-3">
        <div class="flex gap-2">
            <button onclick="closeModal('refModal')" class="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-500">취소</button>
            <button onclick="postRef()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">등록</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════
     Firebase + 앱 로직
════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
    getFirestore, collection, doc,
    onSnapshot, addDoc, setDoc, updateDoc, deleteDoc,
    getDocs, getDoc, query, orderBy, serverTimestamp, where
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const FC = {
    apiKey: "AIzaSyDNPl9n3gt-ZJqZHKFzSl5PufLOCgG7kI4",
    authDomain: "band-solutions.firebaseapp.com",
    projectId: "band-solutions",
    storageBucket: "band-solutions.firebasestorage.app",
    messagingSenderId: "1094046119043",
    appId: "1:1094046119043:web:e70814fad4cc0fea7097b6"
};
const app = initializeApp(FC);
const db  = getFirestore(app);

const myPart = localStorage.getItem('myPart');
if (!myPart) { location.href = 'index.html'; }

document.getElementById('logoutBtn').addEventListener('click', () => {
    if (confirm('로그아웃 하시겠습니까?')) { localStorage.clear(); location.href = 'index.html'; }
});

// ── role 실시간 반영 ──
let myRole = localStorage.getItem('myRole') || 'member';
applyRoleUI(myRole);

onSnapshot(doc(db, 'usan_band', myPart), snap => {
    if (!snap.exists()) return;
    myRole = snap.data().role || 'member';
    localStorage.setItem('myRole', myRole);
    applyRoleUI(myRole);
});

function applyRoleUI(role) {
    const isLeader = (role === 'leader');
    document.getElementById('admin-panel').classList.toggle('hidden', !isLeader);
    document.getElementById('nav-members-btn').classList.toggle('hidden', !isLeader);
    document.getElementById('create-vote-section').classList.toggle('hidden', !isLeader);
    document.getElementById('confirm-vote-btn').classList.toggle('hidden', !isLeader);
    document.getElementById('progress-section').classList.remove('hidden');
    const badge = document.getElementById('hd-part');
    badge.textContent = isLeader ? `🎸 리더 · ${myPart}` : `PART: ${myPart}`;
    badge.style.color  = isLeader ? '#f59e0b' : '#3b82f6';
}

// ══════════════════════════════
// 밴드 설정 정보 → 홈 화면 반영
// ══════════════════════════════
onSnapshot(doc(db, 'usan_system', 'band_info'), snap => {
    if (!snap.exists()) return;
    const d = snap.data();

    // 밴드명 헤더
    if (d.name) document.getElementById('hd-bandname').textContent = d.name;

    // 합주실 정보
    if (d.studioName) {
        document.getElementById('studio-info').classList.remove('hidden');
        document.getElementById('studio-name-display').textContent = d.studioName;
        document.getElementById('studio-addr-display').textContent = d.studioAddr || '';

let currentVoteId = null;
let myVotes = [];

onSnapshot(collection(db,'usan_vote'), snap => {
    if (snap.empty) { renderNoVote(); return; }
    currentVoteId = snap.docs[0].id;
    renderVote(snap.docs[0].id, snap.docs[0].data());
});

function renderNoVote() {
    document.getElementById('vote-options').innerHTML = '<p class="text-gray-400 text-sm text-center py-4">진행 중인 투표가 없습니다</p>';
    document.getElementById('vote-status-badge').textContent = '대기 중';
    document.getElementById('submit-vote-btn').classList.add('hidden');
    document.getElementById('confirm-vote-btn').classList.add('hidden');
    document.getElementById('confirmed-schedule').classList.add('hidden');
}

function renderVote(id, data) {
    if (data.confirmed) {
        document.getElementById('confirmed-schedule').classList.remove('hidden');
        document.getElementById('confirmed-date-text').textContent = data.confirmedDate;
        renderDday(data.confirmedDate);
        document.getElementById('vote-options').innerHTML = '<p class="text-green-600 text-sm text-center py-2">✅ 합주일 확정!</p>';
        document.getElementById('vote-status-badge').textContent = '확정';
        document.getElementById('submit-vote-btn').classList.add('hidden');
        document.getElementById('confirm-vote-btn').classList.add('hidden');
        return;
    }
    const options = data.options || [];
    const votes   = data.votes   || {};
    const total   = data.totalMembers || 5;
    document.getElementById('vote-status-badge').textContent = `투표중 · ${data.deadline||''}`;
    document.getElementById('submit-vote-btn').classList.remove('hidden');

    const container = document.getElementById('vote-options');
    container.innerHTML = '';
    options.forEach((opt, i) => {
        const voters   = votes[i] || [];
        const count    = voters.length;
        const pct      = Math.round(count / total * 100);
        const isMyVote = voters.includes(myPart);
        if (isMyVote && !myVotes.includes(i)) myVotes.push(i);
        const div = document.createElement('div');
        div.className = `border rounded-xl p-3 cursor-pointer transition-all ${isMyVote?'border-blue-400 bg-blue-50':'border-gray-200'}`;
        div.innerHTML = `
            <div class="flex justify-between items-center mb-1.5">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="vcb-${i}" ${isMyVote?'checked':''} onchange="toggleVote(${i})">
                    <div>
                        <p class="text-sm font-bold text-gray-800">${opt.date}</p>
                        <p class="text-xs text-gray-400">${opt.time}</p>
                    </div>
                </label>
                <span class="text-xs font-bold text-blue-600">${count}명</span>
            </div>
            <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div class="vote-bar h-full bg-blue-400 rounded-full" style="width:${pct}%"></div>
            </div>
            <p class="text-xs text-gray-400 mt-1">${voters.join(', ')||'없음'}</p>`;
        container.appendChild(div);
    });
}

window.toggleVote = (idx) => {
    myVotes = myVotes.includes(idx) ? myVotes.filter(v=>v!==idx) : [...myVotes, idx];
};

document.getElementById('submit-vote-btn').addEventListener('click', async () => {
    if (!currentVoteId) return;
    const ref  = doc(db,'usan_vote',currentVoteId);
    const snap = await getDoc(ref);
    const votes = { ...(snap.data().votes || {}) };
    Object.keys(votes).forEach(k => { votes[k] = (votes[k]||[]).filter(p=>p!==myPart); });
    myVotes.forEach(i => { if(!votes[i]) votes[i]=[]; votes[i].push(myPart); });
    await updateDoc(ref, { votes });
    toast('투표 완료!','ok');
    myVotes = [];
});

document.getElementById('confirm-vote-btn').addEventListener('click', async () => {
    if (!currentVoteId) return;
    const snap = await getDoc(doc(db,'usan_vote',currentVoteId));
    const { options=[], votes={} } = snap.data();
    let bestIdx=0, bestCount=0;
    options.forEach((_,i) => { const c=(votes[i]||[]).length; if(c>bestCount){bestCount=c;bestIdx=i;} });
    const confirmed = `${options[bestIdx].date} ${options[bestIdx].time}`;
    if (!confirm(`"${confirmed}"으로 확정할까요?`)) return;
    await updateDoc(doc(db,'usan_vote',currentVoteId), { confirmed:true, confirmedDate:confirmed });
});

window.createVote = async () => {
    const dates = [...document.querySelectorAll('.vote-date-input')];
    const times = [...document.querySelectorAll('.vote-time-input')];
    const opts  = dates.map((d,i)=>d.value?{date:d.value,time:times[i]?.value||'14:00'}:null).filter(Boolean);
    if (!opts.length) return toast('날짜를 입력하세요','warn');
    const existing = await getDocs(collection(db,'usan_vote'));
    for (const d of existing.docs) await deleteDoc(d.ref);
    await addDoc(collection(db,'usan_vote'), {
        options:opts, deadline:document.getElementById('vote-deadline').value,
        votes:{}, confirmed:false, totalMembers:5, createdAt:serverTimestamp()
    });
    toast('투표 시작!','ok');
};

function renderDday(dateStr) {
    const parts    = dateStr.split(' ');
    const dateOnly = parts[0];
    const timeOnly = parts.slice(1).join(' ');
    const diff     = Math.ceil((new Date(dateOnly)-new Date())/86400000);
    const ddayText = diff>0?`D-${diff}`:diff===0?'D-Day!':'지남';
    document.getElementById('dday-content').innerHTML = `
        <div class="flex items-center justify-between">
            <div>
                <p class="text-base font-bold text-gray-800">${dateOnly}</p>
                <p class="text-xs text-gray-500">${timeOnly}</p>
            </div>
            <div class="text-2xl font-bold text-blue-600">${ddayText}</div>
        </div>`;
}

const STATUS_CLASS = { candidate:'badge-candidate', practice:'badge-practice', done:'badge-done' };

function renderSongs() {
    const list     = document.getElementById('song-list');
    const filtered = currentFilter==='all' ? allSongs : allSongs.filter(s=>s.status===currentFilter);
    if (!filtered.length) { list.innerHTML='<p class="text-gray-400 text-sm text-center py-6">곡이 없습니다</p>'; return; }
    list.innerHTML = '';
    filtered.forEach(s => {
        const prog   = s.progress || {};
        const parts  = Object.keys(prog);
        const avg    = parts.length ? Math.round(parts.reduce((a,p)=>a+(prog[p]||0),0)/parts.length) : 0;
        const myProg = prog[myPart] || 0;
        const card   = document.createElement('div');
        card.className = 'song-card bg-white rounded-2xl shadow-sm overflow-hidden';
        card.innerHTML = `
            <!-- 헤더 (탭 역할) -->
            <div class="p-4 cursor-pointer" onclick="toggleSongCard('${s.id}')">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex-1 min-w-0 mr-2">
                        <p class="font-bold text-gray-800 text-sm truncate">${s.title}</p>
                        <p class="text-xs text-gray-400">${s.artist||''}</p>
                    </div>
                    <span class="text-xs px-2 py-0.5 rounded-full font-bold flex-none ${STATUS_CLASS[s.status]}">${STATUS_LABEL[s.status]}</span>
                </div>
                <!-- 팀 진도바 -->
                <div class="flex items-center gap-2">
                    <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full rounded-full" style="width:${avg}%;background:${PROG_COLOR[s.status]};transition:width .4s"></div>
                    </div>
                    <span class="text-xs text-gray-400 flex-none">팀 ${avg}% / 나 ${myProg}%</span>
                </div>
            </div>
            <!-- 펼침: 자료 + 관리 -->
            <div id="song-detail-${s.id}" class="song-detail border-t border-gray-100">
                <!-- 파일 목록 -->
                <div id="file-list-${s.id}" class="divide-y divide-gray-50"></div>
                <!-- 리더 전용 버튼 -->
                ${myRole==='leader'?`
                <div class="p-3 space-y-2">
                    <button onclick="openFileModal('${s.id}','${s.title}')" class="w-full py-2 border border-dashed border-blue-200 text-blue-500 rounded-xl text-xs font-bold">+ 악보 / 음원 / 링크 업로드</button>
                    <div class="flex gap-2">
                        <select onchange="changeSongStatus('${s.id}',this.value)" class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-1.5">
                            <option value="candidate" ${s.status==='candidate'?'selected':''}>후보곡</option>
                            <option value="practice"  ${s.status==='practice'?'selected':''}>연습중</option>
                            <option value="done"      ${s.status==='done'?'selected':''}>완료</option>
                        </select>
                        <button onclick="deleteSong('${s.id}')" class="text-xs text-red-400 border border-red-200 rounded-lg px-3 py-1.5">삭제</button>
                    </div>
                </div>`:''}
            </div>`;
        list.appendChild(card);
        // 파일 실시간 로드
        loadSongFiles(s.id);
    });
}

function loadSongFiles(songId) {
    onSnapshot(collection(db,`usan_songs/${songId}/files`), snap => {
        const container = document.getElementById(`file-list-${songId}`);
        if (!container) return;
        if (snap.empty) { container.innerHTML = '<p class="text-xs text-gray-400 text-center py-3">업로드된 자료가 없습니다</p>'; return; }
        container.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            const typeIcon = data.type==='score'?'📄':data.type==='track'?'🎧':'🔗';
            const typeLabel= data.type==='score'?'악보':data.type==='track'?'음원':'링크';
            const typeBg   = data.type==='score'?'bg-red-50 text-red-600':data.type==='track'?'bg-green-50 text-green-600':'bg-blue-50 text-blue-600';
            const row = document.createElement('div');
            row.className = 'file-row';
            row.innerHTML = `
                <span class="text-xs font-bold px-1.5 py-0.5 rounded ${typeBg} flex-none">${typeIcon} ${typeLabel}</span>
                <span class="text-xs text-gray-700 flex-1 truncate">${data.name}</span>
                ${data.size?`<span class="text-xs text-gray-400 flex-none">${data.size}</span>`:''}
                ${data.url?`<a href="${data.url}" target="_blank" class="text-xs text-blue-500 border border-blue-200 px-2 py-1 rounded-lg flex-none">받기</a>`:''}
                ${myRole==='leader'?`<button onclick="deleteSongFile('${songId}','${d.id}')" class="text-xs text-gray-300 flex-none">✕</button>`:''}`;
            container.appendChild(row);
        });
    });
}

window.openModal  = (id) => document.getElementById(id).classList.add('open');
window.closeModal = (id) => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});

// ── 토스트 ──
function toast(msg, type='ok') {
    const colors = { ok:['#14532d','#86efac'], warn:['#713f12','#fde68a'], err:['#7f1d1d','#fca5a5'] };
    const [bg,color] = colors[type]||colors.ok;
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);background:${bg};color:${color};padding:.55rem 1.1rem;border-radius:.75rem;font-size:.8rem;font-weight:700;z-index:999;white-space:nowrap;`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2400);
}
</script>
